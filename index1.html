<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        .container,ul,li,.container2{
            display:flex;
            align-items: center;
            justify-content:right;
            gap:5em;
            list-style: none;
            padding: 20px 3em;


        }
       li{
        position: relative;
        display: inline-block;
        padding: 5px 0;
        cursor: pointer;
       }
       li::after{
            content: '';
            position: absolute;
            border-bottom: solid 2px orange;
            width:0;
            bottom:0;
            left:0;
            transition: 0.2s;
       }
       li:hover::after{
        width:100%;
       background:linear-gradient(yellow ,black);
        
       }
      
       button{
        padding: 0.3em;
        border:solid 1px orange;
        border-radius: 5em;
       }
       button:hover{
        color: white;
        background-color: black;
       }

    </style>
</head>
<body>
        <header>
        <div class="container">
            <ul>
                <li>Services</li>
                <li>Developers</li>
                <li>Company</li>
                <li>Blog</li>
                <li>About</li>
            </ul>
        </div></header>
        <div class="container2">
            <a href="index2.html">
<button type="button" class="btn btn-primary">
  <i class="bi bi-sun"></i> DarkMode
</button>
</a>
        </div>
</body>
</html>
