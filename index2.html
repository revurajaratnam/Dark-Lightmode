<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Home</title>
    <style>
        *{
            padding:0;
            margin:0;
            box-sizing: border-box;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-color: black;
            color: yellow;
        }
        .container,ul,li,.container2{
            display:flex;
            align-items: center;
            justify-content:right;
            gap:5em;
            list-style: none;
            padding: 20px 3em;


        }
       li{
        position: relative;
        display: inline-block;
        padding: 5px 0;
        cursor: pointer;
       }
       li::after{
            content: '';
            position: absolute;
            border-bottom: solid 2px white;
            width:0;
            bottom:0;
            left:0;
            transition: 0.2s;
            background:linear-gradient(yellow,white);
       }
       li:hover::after{
        width:100%;
        
       }
       
       button{
        padding:0.3em;
        border: solid 1px white;
        border-radius: 5em;
        cursor: pointer;
       }
       #lolgin:after{
        content: '';
        position: absolute;
        border: solid 1px yellow;
        width:0;
        left:0;;
       }
       #login:hover::after{
        width: 100%;
       }

    </style>
</head>
<body>
        <header>
        <div class="container">
            <ul>
                <li>Services</li>
                <li>Developers</li>
                <li>Company</li>
                <li>Blog</li>
                <li>About</li>
                <li id="login">Login</li>
                <li id="signin"> SignUp</li>
            </ul>
        </div></header>
        <div class="container2">
            <a href="index.html"><button type="button" class="btn btn-primary">
  <i class="bi bi-moon"></i> Nightmode
</button></a>
        </div>
</body>
</html>
